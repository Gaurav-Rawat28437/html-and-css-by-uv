
<html>
<head>
    <title>Input tags</title>
</head>
<body>
    <h1>Input tags</h1>

    <label for="un">Username</label>
    <input id="un" type="text" placeholder="admin" minlength="1" maxlength="20">

    <br>
    
    <label for="ph">Contact Number</label>
    <input id="ph" type="tel" placeholder="phone number" minlength="0" maxlength="10">

    <br>
    
    <label for="em">Email</label>
    <input id="em" type="email" placeholder="*@gmail.com">

    <br>
    
    <label for="pw">Password</label>
    <input id="pw" type="password" placeholder="password">

    <br>

    <label for="ag">Age</label>
    <input id="ag" type="number" placeholder="your age" min="0" max="120">

    <br>

    <label for="im">select a file</label>
    <input id="im" type="file">

    <br>

    <label for="cb">I agree with all term and condition</label>
    <input id="cb" type="checkbox">

    <br>

    <label for="dt">date</label>
    <input id="dt" type="date">
    <input type="datetime-local">

    <br>
    Gender :-
    <label for="M">Male</label>
    <input id="M" type="radio" name="gender">
    <label for="F">Female</label>
    <input id="F" type="radio" name="gender">
    <label for="Oth">Other</label>
    <input id="Oth" type="radio" name="gender">
 

</body>
</html>
